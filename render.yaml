services:
  # Frontend - Static Site
  - type: web
    name: oltush-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://oltush-backend.onrender.com/api

  # Backend - Go Web Service
  - type: web
    name: oltush-backend
    env: go
    buildCommand: go build -o server ./cmd/server
    startCommand: ./server
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        value: postgresql://postgres:2g%2C%40f4A3CnpyWjN@db.wovdicelyhwaonikrbix.supabase.co:5432/postgres?sslmode=require
      - key: APP_ENV
        value: production
      - key: BEPAID_ID
        value: ""
      - key: BEPAID_SECRET
        value: ""
      - key: BEPAID_CHECKOUT_URL
        value: https://checkout.bepaid.by/v2/checkout
      - key: BOT_TOKEN
        value: 8835273304:AAEBk6yCMZyYhaxhvG_lm4tnIDf7V8Wm8G0
      - key: ADMIN_TG_IDS
        value: 8835273304
      - key: FRONTEND_URL
        value: https://oltush-frontend.onrender.com

